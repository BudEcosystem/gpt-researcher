apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "gpt-researcher.fullname" . }}-test-connection"
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gpt-researcher.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:8.8.0
      command: ["sh", "-c"]
      args:
        {{- if .Values.fullstack.enabled }}
        - "curl -fsS http://{{ include "gpt-researcher.fullname" . }}-fullstack:{{ .Values.fullstack.service.port }}/ > /dev/null"
        {{- else if .Values.backend.enabled }}
        - "curl -fsS http://{{ include "gpt-researcher.fullname" . }}-backend:{{ .Values.backend.service.port }}/ > /dev/null"
        {{- else }}
        - "curl -fsS http://{{ include "gpt-researcher.fullname" . }}-frontend:{{ .Values.frontend.service.port }}/ > /dev/null"
        {{- end }}
