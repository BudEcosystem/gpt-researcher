{{- if and .Values.backend.enabled (not .Values.fullstack.enabled) }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "gpt-researcher.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gpt-researcher.componentLabels" (dict "ctx" . "component" "backend") | nindent 4 }}
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "gpt-researcher.componentSelectorLabels" (dict "ctx" . "component" "backend") | nindent 4 }}
{{- end }}
