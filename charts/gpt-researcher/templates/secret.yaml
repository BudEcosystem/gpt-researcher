{{- if and .Values.secrets.create (not .Values.secrets.existingSecret) (not .Values.secrets.externalSecrets.enabled) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "gpt-researcher.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gpt-researcher.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $k, $v := .Values.secrets.data }}
  {{- if $v }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
  {{- end }}
{{- end }}
