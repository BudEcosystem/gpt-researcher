{{- if and .Values.secrets.externalSecrets.enabled (not .Values.secrets.existingSecret) }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "gpt-researcher.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gpt-researcher.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.secrets.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ required "secrets.externalSecrets.secretStoreRef.name is required" .Values.secrets.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.secrets.externalSecrets.secretStoreRef.kind }}
  target:
    name: {{ include "gpt-researcher.fullname" . }}-secrets
    creationPolicy: Owner
  data:
    {{- range .Values.secrets.externalSecrets.data }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        {{- toYaml .remoteRef | nindent 8 }}
    {{- end }}
{{- end }}
