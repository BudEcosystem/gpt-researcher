secrets:
  create: false
  externalSecrets:
    enabled: true
    refreshInterval: 15m
    secretStoreRef:
      name: vault-backend
      kind: ClusterSecretStore
    data:
      - secretKey: OPENAI_API_KEY
        remoteRef:
          key: secret/data/gptr
          property: OPENAI_API_KEY
      - secretKey: TAVILY_API_KEY
        remoteRef:
          key: secret/data/gptr
          property: TAVILY_API_KEY
frontend:
  env:
    NEXT_PUBLIC_GPTR_API_URL: "https://gptr.example.com/api"
