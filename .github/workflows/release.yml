name: Release

# Triggered on semver tags like v0.1.0. Builds multi-arch backend (base + full),
# frontend images to budstudio/* on Docker Hub, and publishes the Helm chart
# as an OCI artifact on ghcr.io/budecosystem/charts plus a gh-pages index.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write
  packages: write

env:
  BACKEND_IMAGE: budstudio/gpt-researcher-backend
  FRONTEND_IMAGE: budstudio/gpt-researcher-frontend
  CHART_OCI: ghcr.io/budecosystem/charts

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

  backend:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend (base)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ needs.version.outputs.version }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha,scope=backend-base
          cache-to: type=gha,scope=backend-base,mode=max

      - name: Build & push backend (full)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.full
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            BASE_IMAGE=${{ env.BACKEND_IMAGE }}:${{ needs.version.outputs.version }}
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ needs.version.outputs.version }}-full
            ${{ env.BACKEND_IMAGE }}:latest-full
          cache-from: type=gha,scope=backend-full
          cache-to: type=gha,scope=backend-full,mode=max

  frontend:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/nextjs
          file: ./frontend/nextjs/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ needs.version.outputs.version }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  chart:
    needs: [version, backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: azure/setup-helm@v4
        with:
          version: v3.15.0

      - name: Set chart version + appVersion
        run: |
          v="${{ needs.version.outputs.version }}"
          sed -i "s/^version:.*/version: ${v}/" charts/gpt-researcher/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${v}\"/" charts/gpt-researcher/Chart.yaml

      - name: Helm lint
        run: helm lint charts/gpt-researcher

      - name: Package chart
        run: |
          mkdir -p .chart-dist
          helm package charts/gpt-researcher -d .chart-dist

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push chart to OCI
        run: |
          helm push ".chart-dist/gpt-researcher-${{ needs.version.outputs.version }}.tgz" oci://${{ env.CHART_OCI }}

      - name: Publish to gh-pages (index.yaml)
        uses: helm/chart-releaser-action@v1.6.0
        with:
          charts_dir: charts
          skip_existing: true
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
